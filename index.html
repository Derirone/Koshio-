<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌿</title>

<style>

body{

margin:0;

padding:0;

background:#F8F6F2;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

font-family:Arial;

}

.card{

width:90%;

max-width:420px;

background:white;

padding:30px;

border-radius:30px;

box-shadow:0px 10px 25px rgba(0,0,0,.08);

text-align:center;

animation:fade .8s;

}

img{

width:180px;

height:180px;

border-radius:20px;

margin-bottom:20px;

}

h1{

color:#56754f;

}

p{

font-size:18px;

line-height:28px;

color:#555;

}

button{

margin-top:30px;

width:100%;

padding:15px;

border:none;

border-radius:40px;

background:#C6E5B1;

font-size:18px;

cursor:pointer;

}

button:hover{

transform:scale(1.02);

}

.progress{

width:100%;

height:8px;

background:#ececec;

border-radius:20px;

margin-bottom:25px;

}

.bar{

height:100%;

width:17%;

background:#C6E5B1;

border-radius:20px;

transition:.5s;

}

small{

color:#9cb38d;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<div class="progress">

<div class="bar" id="bar"></div>
